<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer circle — the universal whole -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#1a1a3e" stroke-width="5"/>
  <!-- Horizontal axis -->
  <line x1="6" y1="50" x2="94" y2="50" stroke="#1a1a3e" stroke-width="4"/>
  <!-- Vertical axis -->
  <line x1="50" y1="6" x2="50" y2="94" stroke="#1a1a3e" stroke-width="4"/>
  <!-- Inner ring — the Monad, the unmoved mover, the still center -->
  <circle cx="50" cy="50" r="8" fill="none" stroke="#1a1a3e" stroke-width="3"/>
</svg>
